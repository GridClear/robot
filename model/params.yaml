# ============================================================================
# Robot Dog — single source of truth for geometry, joints, and servo mapping.
#
# 8-DOF quadruped: 4 legs x 2 joints (abduction + knee). Matches the real
# hardware (see robot/images + firmware_arduino/robotdog8.ino). The right side
# is mirror-mounted, so the generator flips the abduction axis on right legs.
#
# generate.py reads THIS file and emits:
#   - robot_dog.urdf      (Isaac Lab / URDF importers)
#   - robot_dog.xml       (MuJoCo MJCF)
#   - servo_map.json      (control runtime + firmware servo_config.h)
#
# All lengths in METERS, masses in KILOGRAMS, angles in RADIANS.
# ============================================================================

robot_name: robot_dog

# --- Trunk (body) ----------------------------------------------------------
trunk:
  size: [0.30, 0.12, 0.06]   # x(length) y(width) z(height)
  mass: 0.50                  # real ~0.7kg total: chassis+electronics+battery+4 body servos

# --- Leg link geometry (one leg; replicated x4) ----------------------------
# Chain per leg: trunk -> abduction(x) -> hip_link -> knee(y) -> shank -> foot
leg:
  hip_link:   { length: 0.05, radius: 0.018, mass: 0.030 }  # abduction housing + knee micro-servo
  shank:      { length: 0.13, radius: 0.013, mass: 0.015 }  # green lower leg (light plastic)
  foot_radius: 0.016

# --- Corner mount offsets from trunk center --------------------------------
# x sign: front(+) / rear(-);  y sign: left(+) / right(-)
# mirror = right side: the generator flips the abduction joint axis so a single
# positive abduction default splays BOTH sides outward (matches mirror-mounted servos).
corners:
  FL: { xy: [ 0.12,  0.06], mirror: false }   # front-left
  FR: { xy: [ 0.12, -0.06], mirror: true  }   # front-right
  RL: { xy: [-0.12,  0.06], mirror: false }   # rear-left
  RR: { xy: [-0.12, -0.06], mirror: true  }   # rear-right

# --- Joint definitions (per joint TYPE) ------------------------------------
# limits in radians; effort N*m; velocity rad/s. Order within a leg defines the
# kinematic chain and the obs/action vector order per leg.
joints:
  # effort/velocity matched to MG90S-class micro servos (~0.2 N*m stall, ~6 rad/s loaded)
  abd:   { axis: [1, 0, 0], lower: -1.00, upper: 1.00, effort: 0.20, velocity: 6.0 }  # hip abduction (lateral)
  knee:  { axis: [0, 1, 0], lower: -1.50, upper: 1.50, effort: 0.20, velocity: 6.0 }  # knee (lower leg)

# Nominal SPRAWLED standing pose (radians), from robot/images: legs splayed
# outward + lower legs bent so the feet plant wide (gecko/crawler posture).
# The generator mirrors abduction per side, so abd>0 splays both sides outward.
default_pose:
  abd: 0.45    # ~26 deg splay outward
  knee: 0.70   # bent to reach the ground

# --- Servo / PCA9685 mapping -----------------------------------------------
# Channels assigned leg-by-leg, joints in joint_order:
#   FL: 0,1   FR: 2,3   RL: 4,5   RR: 6,7   (matches robotdog8.ino)
servo_defaults:
  pwm_min: 500
  pwm_max: 2500
  angle_min: -2.356   # -135 deg (servo travel, centered at 0)
  angle_max:  2.356   # +135 deg
  direction: 1
  zero_offset: 0.0
  freq_hz: 50

# Per-joint-TYPE servo overrides. Both joints' working bands fit within the
# centered servo travel, so no zero_offset needed.
servo_overrides:
  abd:   { zero_offset: 0.0,  direction: 1 }
  knee:  { zero_offset: 0.0,  direction: 1 }

channel_order: [FL, FR, RL, RR]   # leg order for channel assignment
joint_order:   [abd, knee]        # within each leg (per-leg channel order)
