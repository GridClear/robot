; ESP32 quadruped controller — WiFi (HTTP+WebSocket) + BLE, 12 servos via PCA9685.
; Build:  pio run            Flash:  pio run -t upload      Monitor: pio device monitor
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv  ; 3MB app — WiFi+BLE+AsyncWebServer is large
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.2
    bblanchon/ArduinoJson @ ^7.2.0
    esp32async/ESPAsyncWebServer @ ^3.6.0
    esp32async/AsyncTCP @ ^3.3.2
    h2zero/NimBLE-Arduino @ ^1.4.2
build_flags =
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
